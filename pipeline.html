<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Pipeline - LeadGen Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar will be injected here by navbar.js -->

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h2 style="margin:0; font-size:1.2rem;">Data Pipeline</h2>
          <span style="color:var(--text-muted); font-size:.8rem; margin-left:12px;">Scrape Google Maps & Sync to Airtable</span>
        </div>
        <div class="top-bar-right">
           <div id="backendStatusPill" class="status-pill status-pill--secondary">
              <span class="status-dot status-dot--error" id="backendStatusDot"></span>
              <span id="backendStatusText" style="font-size: .7rem;">Backend: Offline</span>
           </div>
        </div>
      </header>

      <div class="view-content" style="padding: 24px;">
        <div class="pipeline-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          
          <!-- Column 1: Scraper -->
          <div class="card">
            <div class="card-header">
              <div class="card-icon card-icon--blue">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              </div>
              <div class="card-title-group">
                <h3 class="card-title">Step 1: Scrape Leads</h3>
                <span class="step-badge" id="badge-step1">Idle</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Search Keywords</label>
              <input type="text" id="keywords" class="form-input" placeholder="e.g. Cafe Jakarta, Restoran Surabaya" />
            </div>

            <div class="form-group">
              <label class="form-label">Limit per Keyword</label>
              <input type="number" id="limitPerKeyword" class="form-input" value="50" min="1" max="500" />
            </div>

            <div class="card-actions" style="margin-top:20px;">
              <button class="btn btn-primary" id="startScrapeBtn" onclick="startScraper()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
                Start Scraper
              </button>
              <button class="btn btn-error" id="stopScrapeBtn" onclick="stopScraper()" style="display:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
                Stop
              </button>
            </div>

            <div id="scrapeProgressBox" class="progress-box" style="display:none; margin-top:20px;">
              <div class="progress-header">
                <span class="progress-label" id="scrapeProgressLabel">Scraping data...</span>
                <span class="progress-pct" id="scrapeCount">0 / 0</span>
              </div>
              <div class="progress-bar-container">
                <div id="scrapeBar" class="progress-bar progress-bar--blue" style="width: 0%"></div>
              </div>
            </div>
          </div>

          <!-- Column 2: Airtable Sync -->
          <div class="card">
            <div class="card-header">
              <div class="card-icon card-icon--cyan">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </div>
              <div class="card-title-group">
                <h3 class="card-title">Step 2: Sync to Airtable</h3>
                <span class="step-badge" id="badge-step2">Idle</span>
              </div>
            </div>

            <div class="stats-mini-grid">
              <div class="stat-mini">
                <span class="stat-mini-label">Pending</span>
                <span class="stat-mini-value" id="pendingAirtableCount">0</span>
              </div>
              <div class="stat-mini">
                <span class="stat-mini-label">Success</span>
                <span class="stat-mini-value" id="insertSuccess" style="color:var(--green)">0</span>
              </div>
            </div>

            <div class="card-actions" style="margin-top:20px;">
              <button class="btn btn-cyan" id="sendAirtableBtn" onclick="sendToAirtable()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Sync to Airtable
              </button>
              <button class="btn btn-error" id="stopAirtableBtn" onclick="stopAirtable()" style="display:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
                Stop Sync
              </button>
            </div>

            <div id="airtableProgressBox" class="progress-box" style="display:none; margin-top:20px;">
              <div class="progress-header">
                <span class="progress-label" id="airtableProgressLabel">Inserting records...</span>
                <span class="progress-pct" id="airtableCount">0 / 0</span>
              </div>
              <div class="progress-bar-container">
                <div id="airtableBar" class="progress-bar progress-bar--cyan" style="width: 0%"></div>
              </div>
              <div style="font-size: .65rem; margin-top: 8px; color: var(--text-muted);" id="insertFailed">✗ 0 failed</div>
            </div>
          </div>

        </div>

        <!-- Log Section in Pipeline -->
        <div class="card" style="margin-top:24px;">
           <div class="card-header">
             <h3 class="card-title">Pipeline Log</h3>
             <button class="btn-sm btn-ghost" onclick="clearLog()">Clear</button>
           </div>
           <div class="log-body" id="logBody" style="height: 300px; font-size: .8rem;"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="navbar.js"></script>
  <script src="app.js"></script>
</body>
</html>
